let currentQ = 0;
let scores = [];
const totalQuestions = 10;

function startTest() {
  currentQ = 0;
  scores = [];
  document.getElementById('startPage').style.display = 'none';
  document.getElementById('resultPage').classList.remove('active');
  document.getElementById('resultPage').innerHTML = '';
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQ];
  const progress = ((currentQ) / totalQuestions * 100).toFixed(0);
  const qNum = currentQ + 1;

  let html = `
    <div class="question-page active fade-in" id="qPage">
      <div class="progress-text">第 ${qNum} / ${totalQuestions} 题</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
      <div class="question-number">Q${qNum}</div>
      <div class="question-text">${q.q}</div>`;

  q.options.forEach((opt, i) => {
    html += `<div class="option" onclick="selectOption(this, ${opt.score})">${String.fromCharCode(65 + i)}. ${opt.text}</div>`;
  });


  // 小广告位（答题页底部）
  if (currentQ < totalQuestions) {
    html += `
    <div class="shop-ad">
      <img src="shop_ad.jpg" alt="熊家子弟橱窗" />
      <div class="ad-hint">👆 长按图片识别二维码逛橱窗</div>
    </div>`;
  }

  html += `</div>`;
  document.getElementById('questionContainer').innerHTML = html;
}

function selectOption(el, score) {
  const page = document.getElementById('qPage');
  page.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  scores.push(score);
  setTimeout(() => {
    currentQ++;
    if (currentQ < totalQuestions) {
      renderQuestion();
    } else {
      showResult();
    }
  }, 350);
}

function showResult() {
  document.getElementById('questionContainer').innerHTML = '';

  const avg = scores.reduce((a, b) => a + b, 0) / scores.length;
  const rounded = Math.round(avg * 10) / 10;
  const scoreFixed = rounded.toFixed(1);

  // 确定档位
  let tierKey;
  if (rounded <= 0.2)      { tierKey = '0-0.2'; }
  else if (rounded <= 0.4) { tierKey = '0.3-0.4'; }
  else if (rounded <= 0.6) { tierKey = '0.5'; }
  else if (rounded <= 0.8) { tierKey = '0.6-0.7'; }
  else                       { tierKey = '0.8-1.0'; }

  const result = resultMap[tierKey];

  // 构建结果页
  let html = `<div class="fade-in" id="screenshotArea">`;

  // 分数展示
  html += `
    <div class="score-display">
      <div class="score-number">${scoreFixed}</div>
      <div class="score-label">你的性格指数</div>
    </div>`;

  // 性格类型卡片
  html += `
    <div class="type-card ${result.color}">
      <div class="type-header">
        <span class="dot ${result.color}"></span>
        ${result.emoji} ${result.title}
      </div>
      <div class="type-desc">${result.desc}</div>
    </div>`;

  // 三种角色描述（0 / 0.5 / 1）
  html += `<div class="role-section">
    <div class="role-section-title">不同状态下的你</div>`;

  result.roles.forEach(r => {
    html += `
      <div class="role-card">
        <div class="role-card-tag">
          <span class="role-dot ${r.roleClass}"></span>
          ${r.tag}
        </div>
        <div class="role-card-text">${r.text}</div>
      </div>`;
  });

  html += `</div>`;

  // 二维码关注区域
  html += `
    <div class="qr-section">
      <div class="qr-title">📢 关注公众号「熊家子弟」获取更多内容</div>
      <img class="qr-img" src="qr.jpg" alt="关注熊家子弟">
      <div class="qr-hint">长按识别二维码 → 关注</div>
    </div>`;

  // 免责声明
  html += `
    <div class="disclaimer">
      ⚠️ 本测试仅供娱乐，结果不代表真实性格或性取向。<br>
      每个人都是独特的，标签只是参考，不用太认真～
    </div>`;

  // 按钮区
  html += `
    <button class="share-btn" onclick="shareResult()">📷 生成分享图片</button>
    <button class="btn" onclick="restartTest()" style="width:100%; margin-bottom:4px;">再测一次</button>
    <div style="text-align:center; font-size:12px; color:#555; margin-top:8px;">分享给朋友，看看你们的分数差多少～</div>`;

  html += `</div>`;

  document.getElementById('resultPage').innerHTML = html;
  document.getElementById('resultPage').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restartTest() {
  document.getElementById('resultPage').classList.remove('active');
  document.getElementById('resultPage').innerHTML = '';
  document.getElementById('startPage').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// 分享截图功能 — 生成精简分享卡片
async function shareResult() {
  const btn = document.querySelector('.share-btn');
  if (btn) { btn.textContent = '⏳ 正在生成图片...'; btn.style.pointerEvents = 'none'; }

  // 先移除旧的分享卡片
  const oldCard = document.getElementById('shareCard');
  if (oldCard) oldCard.remove();

  try {
    // 从结果页读取当前数据
    const scoreNum = document.querySelector('.score-number').textContent;
    const typeHeader = document.querySelector('.type-header').textContent.trim();
    const typeDesc = document.querySelector('.type-desc').textContent;

    // 创建分享卡片 DOM
    const card = document.createElement('div');
    card.id = 'shareCard';
    card.className = 'share-card';
    card.innerHTML = `
      <div class="share-card-header">
        <div class="share-card-emoji">🐻</div>
        <div class="share-card-title">性格攻受测试</div>
      </div>
      <div class="share-card-score">${scoreNum}</div>
      <div class="share-card-type">${typeHeader}</div>
      <div class="share-card-desc">${typeDesc}</div>
      <div class="share-card-divider"></div>
      <div class="share-card-qr">
        <img src="qr.jpg" alt="关注熊家子弟">
        <div class="share-card-qr-text">扫码关注「熊家子弟」</div>
      </div>
      <div class="share-card-footer">长按识别二维码关注公众号</div>
    `;
    document.body.appendChild(card);

    // 截图
    const canvas = await html2canvas(card, {
      backgroundColor: '#16213e',
      scale: 2,
      useCORS: true,
      logging: false
    });

    const imgData = canvas.toDataURL('image/jpeg', 0.95);

    // 创建预览遮罩
    const overlay = document.createElement('div');
    overlay.className = 'share-overlay';
    overlay.innerHTML = `
      <img src="${imgData}" alt="测试结果">
      <div class="share-tip">👆 长按图片保存到相册，分享给朋友</div>
      <button class="close-overlay" onclick="this.parentElement.remove()">关闭</button>
    `;
    document.body.appendChild(overlay);

    overlay.addEventListener('click', function(e) {
      if (e.target === overlay) overlay.remove();
    });
  } catch (err) {
    alert('生成图片失败，请重试：' + err.message);
  }

  if (btn) { btn.textContent = '📷 生成分享图片'; btn.style.pointerEvents = ''; }
}
</script>
